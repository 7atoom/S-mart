<div
  class="rounded-2xl overflow-hidden mb-8 cart-recipe-gradient p-6 md:p-8 warm-shadow"
>
  <button
    (click)="backToServings()"
    class="text-xs text-muted hover:text-main font-sans mb-3 block cursor-pointer transition-colors"
  >
    ← Back to servings
  </button>
  <h2 class="font-serif text-2xl md:text-3xl font-bold text-main">
    {{ selectedRecipe.title }}
  </h2>
  <p class="text-muted font-sans mt-1">{{ selectedRecipe.description }}</p>
  <div class="flex items-center gap-4 mt-3">
    <div class="flex items-center gap-1.5 text-sm text-muted">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="w-3.5 h-3.5"
      >
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
      <span class="font-sans">{{ selectedRecipe.time }}</span>
    </div>
    <div class="flex items-center gap-1">
      <span class="w-2 h-2 rounded-full"></span>
      <span class="w-2 h-2 rounded-full bg-[hsl(var(--accent))]"></span>
      <span class="w-2 h-2 rounded-full bg-[hsl(var(--accent))]"></span>
      <span class="text-xs text-muted ml-1 font-sans">{{
          selectedRecipe.difficulty
        }}</span>
    </div>
    <div class="flex items-center gap-1.5 text-sm text-muted">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="w-3.5 h-3.5"
      >
        <path
          d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"
        ></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
      </svg>
      <span class="font-sans">{{ servings }} @if (servings > 1) {
        people
      } @else { person }
      </span>
    </div>
  </div>
</div>

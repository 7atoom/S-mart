<div class="min-h-screen pt-20 pb-24 md:pb-12 bg-page">
  <div class="max-w-3xl mx-auto px-6">
    <!-- Recipe header card -->
    <app-recipe-header
      [selectedRecipe]="recipe"
      [servings]="servings"
      [meal]="meal"
    ></app-recipe-header>

    <!-- Summary line -->
    <app-summary-line
      [itemCount]="itemCount"
      [totalPrice]="totalPrice"
    ></app-summary-line>

    <!-- Ingredients list -->
    <app-ingredients-list
      [ingredients]="ingredients()"
      [servings]="servings"
      (toggleItem)="toggleItem($event)"
    ></app-ingredients-list>
  </div>

  <!-- Fixed bottom bar -->
  <app-bottom-bar
    [itemCount]="itemCount"
    [servings]="servings"
    [totalPrice]="totalPrice"
    [isAddingToCart]="isAddingToCart()"
    (weCookIt)="weCookIt()"
    (addToCart)="addToCart()"
  ></app-bottom-bar>
</div>

<div class="min-h-screen pt-20 pb-24 md:pb-12 bg-page">
  <div class="flex flex-col items-center justify-center min-h-[70vh] px-6">
    <div class="text-center max-w-lg w-full">

      <!-- LOADING STATE -->
      @if (recipeResource.isLoading()) {
        <app-loading-state
          [recipeResource]="recipeResource"
        ></app-loading-state>


        <!--  ERROR STATE  -->
      } @else if (recipeResource.error()) {
        <app-error-state [recipeResource]="recipeResource"></app-error-state>

        <!-- SUCCESS STATE -->
      } @else if (recipeResource.value()) {
        <app-success-state
          [(servings)]="servings"
          [dishName]="dishName()"
          [recipe]="recipe()"
          [scaledQty]="scaledQty()"
          [totalPrice]="totalPrice()"
        ></app-success-state>
      }

    </div>
  </div>
</div>
